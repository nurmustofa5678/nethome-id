<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Tagihan Internet Nethome</title>
    <style>
        /* Mengatur tampilan dasar agar terlihat profesional di HP & Komputer */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Pembungkus utama agar konten tidak terlalu lebar di layar komputer */
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* Efek interaktif saat tombol disentuh/diklik di Android */
        .tombol-inet:active {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">

    <!-- BAGIAN UTAMA (KODE ANDA YANG SUDAH DIRAPIKAN) -->
    <div style="background: rgb(0, 123, 255); border-radius: 12px; color: white; margin: 10px 0px; padding: 25px; box-shadow: 0 4px 15px rgba(0,123,255,0.2);">
        <h3 style="color: white; margin: 0px 0px 15px; font-size: 20px;">Cek Tagihan Dan Pembayaran Internet Anda</h3>
        
        <a href="http://9.154.229.212:8080/isp/login.php" style="color: white; text-decoration: none;" target="_blank">
            <div class="tombol-inet" style="border-radius: 8px; border: 2px solid white; display: inline-block; font-size: 18px; font-weight: bold; padding: 12px 20px; transition: all 0.2s ease;">
                NOMOR INET ANDA 
                <img src="https://cdn-icons-png.flaticon.com/512/751/751463.png" style="height: 20px; margin-left: 8px; vertical-align: middle; width: 20px; filter: brightness(0) invert(1);" />
            </div>
        </a>
    </div> 

    <!-- KETERANGAN DI BAWAH KOTAK -->
    <div style="margin-top: 15px; color: #555; font-size: 14px; line-height: 1.5;">
        Masukkan Nomor Inet Anda Untuk Cek Status Tagihan Anda
    </div>

</div>
<!-- ========================================== -->
    <!-- AWAL KODE SLIDER GAMBAR INFINITE (KANAN KE KIRI) -->
    <!-- ========================================== -->
    <div class="slider-container" style="width: 100%; position: relative; margin-top: 20px; overflow: hidden; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <div class="slides" id="slider" style="display: flex; width: 100%; transition: transform 0.5s ease-in-out;">
            <!-- Gambar asli Anda -->
            <img src="ani2.jpg" alt="" style="width: 100%; flex-shrink: 0; display: block; height: 320px; object-fit: cover;">
            <img src="ani3.jpg" alt="" style="width: 100%; flex-shrink: 0; display: block; height: 320px; object-fit: cover;">
            <img src="ani4.jpg" alt="" style="width: 100%; flex-shrink: 0; display: block; height: 320px; object-fit: cover;">
        </div>
        
        <!-- Tombol Panah Kiri & Kanan -->
        <button onclick="btnMove(-1)" style="position: absolute; top: 50%; transform: translateY(-50%); left: 10px; background: rgba(0, 0, 0, 0.5); color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 18px; border-radius: 50%; user-select: none; z-index: 10;">&#10094;</button>
        <button onclick="btnMove(1)" style="position: absolute; top: 50%; transform: translateY(-50%); right: 10px; background: rgba(0, 0, 0, 0.5); color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 18px; border-radius: 50%; user-select: none; z-index: 10;">&#10095;</button>
    </div>

    <!-- SCRIPT JAVASCRIPT UNTUK CORAK BERPUTAR TERUS (INFINITE LOOP) -->
    <script>
        const slider = document.getElementById('slider');
        let autoSlideInterval;

        // Trik utama: Gandakan gambar pertama dan terakhir secara instan di latar belakang
        const firstClone = slider.children[0].cloneNode(true);
        const lastClone = slider.children[slider.children.length - 1].cloneNode(true);
        
        slider.appendChild(firstClone);
        slider.insertBefore(lastClone, slider.children[0]);

        const totalImages = slider.children.length;
        let counter = 1; // Mulai dari gambar asli pertama
        
        // Atur posisi awal agar langsung mengarah ke gambar asli pertama
        slider.style.transform = `translateX(${-counter * 100}%)`;

        function nextSlide() {
            if (counter >= totalImages - 1) return;
            counter++;
            slider.style.transition = "transform 0.5s ease-in-out";
            slider.style.transform = `translateX(${-counter * 100}%)`;
        }

        function prevSlide() {
            if (counter <= 0) return;
            counter--;
            slider.style.transition = "transform 0.5s ease-in-out";
            slider.style.transform = `translateX(${-counter * 100}%)`;
        }

        // Mengecek posisi kloningan saat transisi selesai untuk memindahkan posisi secara gaib/mulus
        slider.addEventListener('transitionend', () => {
            if (slider.children[counter].src === firstClone.src && counter !== 1) {
                slider.style.transition = "none";
                counter = 1;
                slider.style.transform = `translateX(${-counter * 100}%)`;
            }
            if (slider.children[counter].src === lastClone.src) {
                slider.style.transition = "none";
                counter = totalImages - 2;
                slider.style.transform = `translateX(${-counter * 100}%)`;
            }
        });

        // Kontrol manual tombol panah
        function btnMove(direction) {
            clearInterval(autoSlideInterval); // Hentikan auto-slide sebentar saat tombol ditekan
            if (direction === 1) { nextSlide(); } else { prevSlide(); }
            startAutoSlide(); // Jalankan kembali auto-slide
        }

        // Jalankan jalan otomatis dari kanan ke kiri setiap 4 detik
        function startAutoSlide() {
            autoSlideInterval = setInterval(nextSlide, 4000);
        }

        startAutoSlide();
    </script>
    <!-- ========================================== -->
    <!-- AKHIR KODE SLIDER GAMBAR INFINITE -->
    <!-- ========================================== -->
</body>
</html>
