<!-- SCRIPT JAVASCRIPT SLIDER (DITARUH DI LUAR CONTAINER AGAR SEMPURNA) -->
<script>
    const slider = document.getElementById('slider');
    let autoSlideInterval;

    const firstClone = slider.children[0].cloneNode(true);
    const lastClone = slider.children[slider.children.length - 1].cloneNode(true);
    
    slider.appendChild(firstClone);
    slider.insertBefore(lastClone, slider.children[0]);

    const totalImages = slider.children.length;
    let counter = 1;
    
    slider.style.transform = `translateX(${-counter * 100}%)`;

    function nextSlide() {
        if (counter >= totalImages - 1) return;
        counter++;
        slider.style.transition = "transform 0.5s ease-in-out";
        slider.style.transform = `translateX(${-counter * 100}%)`;
    }

    slider.addEventListener('transitionend', () => {
        if (slider.children[counter].src === firstClone.src && counter !== 1) {
            slider.style.transition = "none";
            counter = 1;
            slider.style.transform = `translateX(${-counter * 100}%)`;
        }
        if (slider.children[counter].src === lastClone.src) {
            slider.style.transition = "none";
            counter = totalImages - 2;
            slider.style.transform = `translateX(${-counter * 100}%)`;
        }
    });

    function startAutoSlide() {
        autoSlideInterval = setInterval(nextSlide, 4000);
    }

    startAutoSlide();
</script>
